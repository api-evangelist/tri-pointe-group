name: Tri Pointe Homes
description: |
  Tri Pointe Homes (NYSE: TPH) is a US homebuilder headquartered in Orange County,
  California. Founded in 2009, it builds single-family and multifamily new homes
  across 13 states plus the District of Columbia under a unified Tri Pointe Homes
  brand that consolidated legacy regional brands including Pardee Homes, Maracay,
  Quadrant Homes, Winchester Homes, and Trendmaker Homes. The company also offers
  ancillary services through Tri Pointe Connect (mortgage), Tri Pointe Assurance
  (title and escrow), and Tri Pointe Advantage (insurance). Tri Pointe operates no
  public developer program, no documented API, and no GitHub presence; its digital
  surface is limited to a marketing site (tripointehomes.com), an investor portal,
  a blog, and a careers portal.
